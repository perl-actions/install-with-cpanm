name: Check dist

on:
    push:
        paths:
            - 'index.js'
            - 'dist/**'
            - '.github/workflows/check-dist.yml'
            - 'package*'
    pull_request:
        paths:
            - 'index.js'
            - 'dist/**'
            - '.github/workflows/check-dist.yml'
            - 'package*'

jobs:
    check-dist:
        runs-on: ubuntu-latest
        name: 'dist is up to date'
        steps:
            - uses: actions/checkout@v6
            - name: Install dependencies
              run: npm ci
            - name: Rebuild dist
              run: npm run build
            - name: Check for uncommitted changes
              run: |
                  if [ -n "$(git status --porcelain dist/)" ]; then
                      echo "dist/index.js is out of sync with index.js"
                      echo "Please run 'npm run build' and commit the result."
                      git diff dist/
                      exit 1
                  fi
